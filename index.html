  }

  .card-desc {

    font-size: 14px;
    margin-bottom: 8px;
  }

  .card-size {
    color: #6e7681;
    font-size: 13px;
  }

  .card-arrow {
    color: #8b949e;
    font-size: 24px;
    flex-shrink: 0;
    transition: transform 0.2s, color 0.2s;
  }

  .card:hover .card-arrow {
    transform: translateX(4px);
    color: #f0f6fc;
  }

  .footer {
    text-align: center;
    margin-top: 48px;
    color: #484f58;
